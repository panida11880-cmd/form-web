<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=kasikornLocal:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==================== */
        /* 1. Variable Definitions (Palette) */
        /* ==================== */
        :root {
            --color-burgundy: #800020;
            --color-black: #121212;
            --color-white: #ffffff;
            --color-gray: #6b7280;
            --color-gray-light: #f1f5f9;
            
            /* Default (Dark Mode) */
            --bg-primary: var(--color-black);
            --bg-secondary: #1e1e1e;
            --text-primary: var(--color-white);
            --text-secondary: #cccccc;
            --accent-color: var(--color-white);
            --accent-text: var(--color-black);
            --border-color: #334155;
        }

        /* ==================== */
        /* 2. Light Mode Activation */
        /* ==================== */
        html.light {
            --bg-primary: var(--color-gray-light);
            --bg-secondary: var(--color-white);
            --text-primary: var(--color-black);
            --text-secondary: #333333;
            --accent-color: var(--color-burgundy);
            --accent-text: var(--color-white);
            --border-color: #e0e0e0;
        }

        body { 
            font-family: 'kasikornLocal', sans-serif; 
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Input & Select Styling */
        input, select {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--color-burgundy);
            outline: none;
            box-shadow: 0 0 0 2px rgba(128, 0, 32, 0.2);
        }

        /* Button Styling */
        .btn-primary {
            background-color: var(--accent-color);
            color: var(--accent-text);
            border: 2px solid transparent;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-ghost {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-ghost:hover {
            background-color: var(--accent-color);
            color: var(--accent-text);
        }

        canvas {
              width: 449px;
    height: 640px;
            
        }

        /* Custom Scrollbar for Dark Mode */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--color-burgundy); border-radius: 4px; }
   
@font-face {
    font-family: 'kasikornLocal';
    src: url('./Font/kasikorn_medim.ttf') format('truetype');
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
}

    
    </style>
</head>

        <script>
        // =========================
        // Theme Logic (Internal)
        // =========================
        (function () {
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                html.classList.add('light');
            } else {
                html.classList.remove('light');
            }
            updateIcons(savedTheme === 'light');
        })();

        function toggleTheme() {
            const html = document.documentElement;
            const isLight = html.classList.contains('light');
            if (isLight) {
                html.classList.remove('light');
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.add('light');
                localStorage.setItem('theme', 'light');
            }
            updateIcons(!isLight);
        }

        function updateIcons(isLightMode) {
            const moon = document.getElementById('iconMoon');
            const sun = document.getElementById('iconSun');
            if (!moon || !sun) return;
            if (isLightMode) {
                moon.classList.remove('hidden');
                sun.classList.add('hidden');
            } else {
                moon.classList.add('hidden');
                sun.classList.remove('hidden');
            }
        }

        // =========================
        // Canvas Logic
        // =========================
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const bg = new Image();
        bg.crossOrigin = "anonymous";

        // Initial Load
        changeBackground();

        function changeBackground() {
            const selector = document.getElementById('bgSelector');
            bg.src = selector.value;
        }

        bg.onload = function() {
            drawCanvas();
        }
        
        bg.onerror = () => console.log("โหลดภาพไม่ได้");

        // --- [ฟังก์ชันใหม่] ตั้งค่าวันที่ปัจจุบันให้ Input ---
        function setCurrentDateTime() {
            const now = new Date();
            // จัดรูปแบบให้เป็น YYYY-MM-DDTHH:mm (มาตรฐานของ datetime-local)
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const isoString = `${year}-${month}-${day}T${hours}:${minutes}`;
            document.getElementById("datetime").value = isoString;
        }

        // --- [ฟังก์ชันใหม่] แปลงวันที่จาก Input ให้เป็นภาษาไทยสำหรับแสดงบน Canvas ---
        function formatThaiDate(dateString) {
            if (!dateString) return "-";
            const date = new Date(dateString);
            if (isNaN(date)) return "-";

            const options = {
                day: 'numeric',
                month: 'short',
                year: '2-digit'
            };
            // toLocaleDateString ภาษา th-TH จะแปลงปี ค.ศ. เป็น พ.ศ. ให้เองอัตโนมัติ
            const dateStr = date.toLocaleDateString('th-TH', options);
            
            const timeStr = date.toLocaleTimeString('th-TH', {
                hour: '2-digit',
                minute: '2-digit'
            });

            return `${dateStr}  ${timeStr} น.`;
        }

        function drawCanvas() {
            const scale = 2;

            const orderId = document.getElementById("orderId").value || "016118193844CTF05802";
            const datetimeVal = document.getElementById("datetime").value; // รับค่าจาก input
            const name1 = document.getElementById("name1").value || "นาง จุฑามาศ ป";
            const acnumber1 = document.getElementById("acnumber1").value || "xxx-x-x0000-x";
            const name2 = document.getElementById("name2").value || "นาย ประสิทธิ์ ครองสุข";
            const acnumber2 = document.getElementById("acnumber2").value || "xxx-x-x1558-x";         
            const amount = document.getElementById("amount").value || "0.00";

            // 🔥 รีเซ็ต canvas
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 🔥 scale คมชัด
            ctx.setTransform(scale, 0, 0, scale, 0, 0);

            // 🔥 วาดพื้นหลัง
            ctx.drawImage(bg, 0, 0, 449, 640);

            ctx.fillStyle = "#484746";
            ctx.textAlign = "left";

            // 📌 วันที่ (ใช้ฟังก์ชันแปลงใหม่)
            ctx.font = "600 20px kasikornLocal";
            const displayDate = formatThaiDate(datetimeVal);
            ctx.fillText(displayDate, 35, 71);

            // 📌 Order ID
            ctx.font = "400 18px kasikornLocal";
            ctx.fillText(orderId, 32, 470);

            // 📌 รายการ
            ctx.font = "400 20px kasikornLocal";
            ctx.fillText(name1, 130, 144);
            ctx.fillText(acnumber1, 129, 209);
            
            ctx.font = "400 20px kasikornLocal";
            ctx.fillText(name2, 130, 310);
            ctx.fillText(acnumber2, 129, 374);

            // 📌 จำนวนเงิน
            ctx.font = "700 22px kasikornLocal";
            ctx.fillStyle = "#000";
            ctx.fillText(formatMoney(amount) + " บาท", 30, 360);
        }

        async function copyCanvas() {
            try {
                canvas.toBlob(async (blob) => {
                    const item = new ClipboardItem({ "image/png": blob });
                    await navigator.clipboard.write([item]);
                    alert("✅ คัดลอกสลิปแล้ว!");
                });
            } catch (err) {
                console.error("Copy failed: ", err);
                alert("❌ ไม่สามารถคัดลอกได้");
            }
        }

        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = 'receipt-slip.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function formatMoney(num) {
            return Number(num.replace(/,/g, '') || 0)
                .toLocaleString('th-TH', { minimumFractionDigits: 2 });
        }

        // =========================
        // Initialize
        // =========================
        document.fonts.ready.then(() => {
            drawCanvas();
        });

        window.onload = () => {
            setCurrentDateTime(); // ตั้งเวลาปัจจุบันให้ Input ก่อน
            changeBackground();   // โหลดพื้นหลัง (ซึ่งจะ trigger drawCanvas อัตโนมัติ)
        };

    </script>
