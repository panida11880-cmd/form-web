  /* Low Power Mode Toggle (iOS style) */
.low-power-wrap {
  margin-top: 10px;

.low-power-label {

/* switch container */
.switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 26px;
}

/* hide default checkbox */
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

/* slider background */
.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #3a4d5b;
  border-radius: 999px;
  transition: 0.25s;
}

/* circle */
.slider::before {
  content: "";
  position: absolute;
  height: 22px;
  width: 22px;
  left: 2px;
  top: 2px;
  background-color: white;
  border-radius: 50%;
  transition: 0.25s;
}

/* ON state */
.switch input:checked + .slider {
  background-color: #facc15; /* iOS yellow */
}

/* move circle */
.switch input:checked + .slider::before {
  transform: translateX(18px);
}
/* Select สวยๆ */
.select-beauty {
  margin-top: 7px;
  padding: 10px 14px;
  font-size: 16px;
  border: 2px solid #5d6970;
  border-radius: 12px;
    background: #2b3643;  /* สีพื้น dropdown */
  color: #ffffff;       /* สีตัวหนังสือ */
  width: 100%;
  outline: none;
  appearance: none;
  cursor: pointer;
  transition: 0.25s;
}
.select-beauty option {
  background-color: #2b3643;
  color: #fff;
}

/* hover */
.select-beauty:hover {
  border-color: #7c8a92;
  background: rgba(255,255,255,0.08);
}

/* focus */
.select-beauty:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
}

/* ลูกศร dropdown */
.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: "⌄";
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  pointer-events: none;
  font-size: 18px;
}

/* ===== Slider เทพๆ ===== */
.battery-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 999px;
  background: linear-gradient(to right, #22c55e 0%, #22c55e 100%);
  outline: none;
  transition: 0.2s;
}

/* track (พื้นหลัง) */
.battery-slider::-webkit-slider-runnable-track {
  height: 6px;
  border-radius: 999px;
  background: transparent;
}

/* thumb (ปุ่ม) */
.battery-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #ffffff;
  border: 3px solid #3b82f6;
  cursor: pointer;
  margin-top: -8px; /* จัดให้อยู่ตรงกลาง */
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: 0.2s;
}

/* ตอน hover */
.battery-slider::-webkit-slider-thumb:hover {
  transform: scale(1.1);
}

/* ตอนกด */
.battery-slider::-webkit-slider-thumb:active {
  transform: scale(1.2);
  border-color: #2563eb;
}

/* Firefox รองรับ */
.battery-slider::-moz-range-track {
  height: 6px;
  border-radius: 999px;
  background: #4b5563;
}

.battery-slider::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #ffffff;
  border: 3px solid #3b82f6;
  cursor: pointer;
}

/* label % */
.batt-label {
  position: absolute;  top: -28px;  left: 0;
  transform: translate(-50%, 0);
  transform: translateX(-50%);
  background: #3b82f6;  color: #fff;  font-size: 12px;

<script>
    // 1. ฟังก์ชันอัปเดตข้อมูลและเจนรูปทับ overlay
    async function updateCopyOverlay() {
      const captureArea = document.getElementById('capture-area');
      const canvas = await html2canvas(captureArea, { 
        scale: 2, 
        useCORS: true, 
        logging: false,
        backgroundColor: null 
      });
      document.getElementById('copy-overlay').src = canvas.toDataURL("image/png");
    }

function syncData() {
  document.getElementById('display-title').innerText = document.getElementById('in-title').value;
  document.getElementById('display-url').innerText = document.getElementById('in-url').value;
  document.getElementById('display-time').innerText = document.getElementById('in-time').value;
  
  const bVal = document.getElementById('in-batt').value;
  const fill = document.getElementById('battery-fill');
  const slider = document.getElementById('in-batt');
  const label = document.getElementById('batt-label');

  const percentVal = ((bVal - slider.min) / (slider.max - slider.min)) * 100;

  slider.style.background = `linear-gradient(to right, #22c55e ${percentVal}%, #4b5563 ${percentVal}%)`;

  label.innerText = bVal + '%';
  fill.style.width = bVal + '%';

  const percent = (bVal - slider.min) / (slider.max - slider.min);
  label.style.left = `calc(${percent * 100}% )`;

  const isLowPower = document.getElementById('low-power').checked;

  if (isLowPower) {
    fill.style.backgroundColor = '#facc15';
  } else {
    fill.style.backgroundColor = (bVal <= 20) ? '#ff3b30' : '#000';
  }

  fill.offsetHeight;

  // ✅ ต้องอยู่ตรงนี้
  updateNetwork();

  // ✅ และตัวนี้
  updateCopyOverlay();
}



    function setTitle(val, btn) {
      document.getElementById('in-title').value = val;
      document.querySelectorAll('.title-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      syncData();
    }

    // 2. ฟังก์ชันจัดการรูปภาพ (ทั้ง Upload และ Paste)
    function handleFile(input) {
      if (input.files[0]) processFile(input.files[0]);
    }

    function processFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('img-render');
        img.src = e.target.result;
        img.style.display = 'block';
        syncData();
      };
      reader.readAsDataURL(file);
    }

    // ฟังก์ชันวางรูป (Paste) - สำคัญมาก ห้ามลบ
    window.addEventListener('paste', e => {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (let index in items) {
        const item = items[index];
        if (item.kind === 'file' && item.type.includes('image')) {
          const blob = item.getAsFile();
          processFile(blob);
        }
      }
    });

function updateNetwork() {
  const isWifi = document.getElementById('network-toggle').checked;
  const wifiIcon = document.getElementById('wifi-icon');
  const cellImg = document.getElementById('cellular-img');
  const select = document.getElementById('network-type');

  // ลิงก์รูปภาพ 4G / 5G (คุณสามารถเปลี่ยน URL เป็นรูปที่คุณต้องการได้)
  const networkIcons = {
    '4G': 'https://i.ibb.co/Y4hMy4LW/4G.png', // ใส่ URL รูป 4G ของคุณ
    '5G': 'https://i.ibb.co/mrQn7DjY/5G.png'  // ใส่ URL รูป 5G ของคุณ
  };

if (isWifi) {
  wifiIcon.style.opacity = '1';
  wifiIcon.style.visibility = 'visible';

  cellImg.style.opacity = '0';
  cellImg.style.visibility = 'hidden';

  select.classList.add('select-disabled');
} else {
  wifiIcon.style.opacity = '0';
  wifiIcon.style.visibility = 'hidden';

  cellImg.style.opacity = '1';
  cellImg.style.visibility = 'visible';

  cellImg.src = networkIcons[select.value];

  select.classList.remove('select-disabled');
}

  updateCopyOverlay();
}
